syntax = "proto3";

package perpilize.settlement.v1;

import "google/api/annotations.proto";
import "perpilize/settlement/v1/settlement.proto";

option go_package = "github.com/perpilize/perpilize/x/settlement/types";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/perpilize/settlement/v1/params";
  }
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1;
}